<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PAGARNUSA UNUSIA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <div class="login-page" id="loginPage">
        <header class="login-header">
            <div class="header-center">
                <img src="logopn.png" alt="Logo PAGARNUSA" class="logo">
                <h1 class="site-title">PAGARNUSA UNUSIA</h1>
            </div>
        </header>

        <main class="login-main">
            <div class="login-container">
                <h2>Akses Halaman Utama</h2>
                <p>Silakan masukkan kode akses untuk melanjutkan. <a href="https://pagarnusa-unusia.github.io/kode-ujian/" target="_blank">Temukan Kode Saya</a></p>
                <div class="input-group">
                    <input type="password" id="accessCode" placeholder="Masukkan Kode Akses" autocomplete="off" required>
                    <button id="loginButton">Masuk</button>
                </div>
                <p id="loginMessage" class="error-message"></p>
            </div>
        </main>

        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p>Memuat...</p>
        </div>
        <footer class="login-footer">
            <p>&copy; 2025 PAGARNUSA UNUSIA. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
